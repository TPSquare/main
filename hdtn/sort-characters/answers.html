<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đáp án sắp xếp kí tự</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html {
        overflow: hidden;
      }

      body {
        display: flex;
        width: 100vw;
        height: 100vh;
        background-color: black;
      }

      main {
        margin: auto;
        color: white;
        font-size: 15vh;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <main></main>
    <script type="module">
      const data = await fetch(`/data.json?t=${Date.now()}`).then((res) => res.json());
      const main = document.body.querySelector("main");
      window.onclick = () => {
        if (!data.length) return;
        main.textContent = data.shift()[1];
      };
    </script>
  </body>
</html>
